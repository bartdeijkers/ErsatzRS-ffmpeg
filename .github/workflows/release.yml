name: Release

# Release-driven build, mirroring the ErsatzRS ci.yml + release.yml split:
# multi-platform.yml is the continuous (push-to-main) Docker CI, while this
# workflow produces the per-RID FFmpeg packages that ErsatzRS downloads at
# startup (ADR-0008) and attaches them to the GitHub Release for the tag.
#
# v1.0.0 is intentionally scoped to two RIDs only: linux-x64 and win-x64.
# (arm64/arm-v7/osx are produced by the continuous Docker CI / future work.)
#
# Runs on the self-hosted Linux release runner. linux-x64 is extracted from the
# runtime Docker image; win-x64 is statically cross-compiled with
# BtbN/FFmpeg-Builds (Docker) — see images/win/ffmpeg-builds/. The Windows
# self-hosted runner is no longer used for releases.
#   linux-x64 -> [self-hosted, ersatzrs-linux-release]
#   win-x64   -> [self-hosted, ersatzrs-linux-release]

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.0.0). Dispatch builds the packages but does not publish a release.'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/bartdeijkers/ersatzrs-ffmpeg
  # Upstream FFmpeg version these packages contain (independent of the repo
  # release tag, which is the v*.*.* git tag).
  FFMPEG_VERSION: 8.1.2

jobs:
  linux-x64:
    name: Build linux-x64 package
    runs-on: [self-hosted, ersatzrs-linux-release]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/linux/amd64/Dockerfile
          platforms: linux/amd64
          load: true
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ env.FFMPEG_VERSION }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Stage self-contained linux-x64 package
        # Extract ffmpeg/ffprobe plus their full shared-library closure from the
        # runtime image so the package runs standalone (ErsatzRS sets
        # LD_LIBRARY_PATH=<dir>/lib). Requires a host glibc >= the build's.
        # Stage under RUNNER_TEMP (outside the checked-out repo) and run the
        # container as the runner user, so no root-owned files land in the
        # workspace to break the next Checkout on this persistent self-hosted
        # runner.
        env:
          IMG: ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
          STAGE: ${{ runner.temp }}/lx-out
        run: |
          set -euo pipefail
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          docker run --rm --user "$(id -u):$(id -g)" --entrypoint bash \
            -v "$STAGE:/out" \
            "$IMG" -c '
              set -e
              dest=/out/ffmpeg
              mkdir -p "$dest/lib"
              cp /usr/local/bin/ffmpeg /usr/local/bin/ffprobe "$dest/"
              for b in "$dest/ffmpeg" "$dest/ffprobe"; do
                ldd "$b" | awk "/=> \// {print \$3}" | sort -u | \
                  while read -r so; do [ -f "$so" ] && cp -Lu "$so" "$dest/lib/" || true; done
              done
            '

      - name: Archive linux-x64 package
        env:
          STAGE: ${{ runner.temp }}/lx-out
          OUTDIR: ${{ runner.temp }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          pkg="ersatzrs-ffmpeg-${VERSION}-linux-x64.tar.gz"
          tar -C "$STAGE" -czf "$OUTDIR/$pkg" ffmpeg
          ( cd "$OUTDIR" && sha256sum "$pkg" > "$pkg.sha256" )

      - name: Upload linux-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ runner.temp }}/ersatzrs-ffmpeg-*-linux-x64.tar.gz*
          if-no-files-found: error

  win-x64:
    name: Build win-x64 package
    # Statically cross-compiled with BtbN/FFmpeg-Builds (Docker) so the package
    # ships two self-contained executables instead of a thin .exe + DLL closure.
    # Runs on the Linux release runner (Docker), not the Windows runner.
    runs-on: [self-hosted, ersatzrs-linux-release]
    env:
      # Pinned FFmpeg-Builds commit (bump deliberately; see
      # images/win/ffmpeg-builds/README.md).
      FFBUILDS_REF: bfcf840002eb1cf68ed626657db2d250cf62e8a2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build static win-x64 FFmpeg via BtbN FFmpeg-Builds
        # makeimage.sh builds the cross toolchain + every dependency into a
        # Docker image; build.sh then statically links FFmpeg against them.
        # The `8.1` addin sets FFmpeg version gating; GIT_BRANCH_OVERRIDE pins
        # the exact upstream release tag (n8.1.2). Our cairo/pixman overrides
        # (which upstream lacks) are dropped into scripts.d/ first, and cairo is
        # registered in the build graph (see below).
        env:
          WORK: ${{ runner.temp }}/ffmpeg-builds
          FFTAG: n${{ env.FFMPEG_VERSION }}
        run: |
          set -euo pipefail
          rm -rf "$WORK"
          git clone https://github.com/BtbN/FFmpeg-Builds.git "$WORK"
          git -C "$WORK" -c advice.detachedHead=false checkout "$FFBUILDS_REF"
          cp "$GITHUB_WORKSPACE"/images/win/ffmpeg-builds/scripts.d/*.sh "$WORK/scripts.d/"
          # Register cairo in the build graph. BtbN's entry stage (zz-final.sh)
          # hard-codes the dependency list that gets built; without this our
          # cairo/pixman scripts are copied in but never reached, so
          # --enable-cairo silently drops out. pixman follows as cairo's dep.
          grep -q 'echo cairo' "$WORK/scripts.d/zz-final.sh" \
            || sed -i 's/^\( *\)echo rpath$/\1echo cairo\n\1echo rpath/' "$WORK/scripts.d/zz-final.sh"
          grep -q 'echo cairo' "$WORK/scripts.d/zz-final.sh"  # fail loudly if the anchor moved
          cd "$WORK"
          ./makeimage.sh win64 gpl 8.1
          GIT_BRANCH_OVERRIDE="$FFTAG" ./build.sh win64 gpl 8.1

      - name: Repackage to ErsatzRS layout
        # BtbN emits <build-name>/bin/{ffmpeg,ffprobe}.exe; ErsatzRS expects the
        # exes at the top of ersatzrs-ffmpeg-<version>-win-x64/. The static build
        # has no DLLs to bundle.
        env:
          WORK: ${{ runner.temp }}/ffmpeg-builds
          OUTDIR: ${{ runner.temp }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          src_zip="$(ls "$WORK"/artifacts/*win64-gpl*.zip | head -n1)"
          tmp="$(mktemp -d)"
          unzip -q "$src_zip" -d "$tmp"
          dest="ersatzrs-ffmpeg-${VERSION}-win-x64"
          rm -rf "${OUTDIR:?}/$dest" && mkdir -p "$OUTDIR/$dest"
          find "$tmp" -name ffmpeg.exe  -exec cp {} "$OUTDIR/$dest/" \;
          find "$tmp" -name ffprobe.exe -exec cp {} "$OUTDIR/$dest/" \;
          find "$tmp" -iname 'LICENSE*'  -exec cp {} "$OUTDIR/$dest/" \;
          test -f "$OUTDIR/$dest/ffmpeg.exe" && test -f "$OUTDIR/$dest/ffprobe.exe"
          # The Linux release runner has `unzip` but not `zip`; use python3
          # (present as /usr/bin/python3) to create the archive instead.
          ( cd "$OUTDIR"
            python3 -c "import shutil,sys; shutil.make_archive(sys.argv[1], 'zip', root_dir='.', base_dir=sys.argv[1])" "$dest"
            sha256sum "${dest}.zip" > "${dest}.zip.sha256" )
          rm -rf "$tmp" "$OUTDIR/$dest"

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: ${{ runner.temp }}/ersatzrs-ffmpeg-*-win-x64.zip*
          if-no-files-found: error

  release:
    name: Publish release
    # Only publish for an actual tag push; workflow_dispatch is build-only.
    if: ${{ github.event_name == 'push' }}
    needs: [linux-x64, win-x64]
    runs-on: [self-hosted, ersatzrs-linux-release]
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        # actions/download-artifact@v4 has failed on this self-hosted runner
        # ("Artifact download failed after 5 retries", v1.0.0). Use the gh CLI
        # instead — it pulls via the API (a different transport than the
        # artifact backend) and is the same tool the publish step already
        # relies on — wrapped in an explicit retry loop. gh places each
        # artifact in dist/<artifact-name>/.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ok=0
          for attempt in 1 2 3 4 5; do
            rm -rf dist && mkdir -p dist
            if gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --dir dist; then
              ok=1; break
            fi
            echo "download attempt ${attempt}/5 failed; retrying in $((attempt*10))s" >&2
            sleep $((attempt*10))
          done
          [ "$ok" = 1 ] || { echo "gh run download failed after 5 attempts" >&2; exit 1; }
          find dist -type f | sort

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f | sort)
          [ "${#files[@]}" -gt 0 ] || { echo "no artifact files downloaded" >&2; exit 1; }
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes "FFmpeg ${FFMPEG_VERSION} for ErsatzRS (drawvg/cairo, libsvtav1, libjxl, zimg). RIDs: linux-x64, win-x64."
          fi
